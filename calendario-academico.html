<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario Academico 2025-2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header-info {
            font-size: 0.95em;
            opacity: 0.95;
            margin-bottom: 15px;
            font-weight: 500;
        }
        
        .header-info span {
            margin: 0 15px;
        }
        
        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .content {
            padding: 30px;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .tab {
            padding: 15px 30px;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }
        
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        
        .tab:hover {
            color: #667eea;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .form-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
        }
        
        textarea {
            min-height: 80px;
            resize: vertical;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .refresh-btn {
            background: #4caf50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        
        .legend {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 14px;
        }
        
        .legend-item.etae { background: #e1f5fe; }
        .legend-item.etcp { background: #e3f2fd; }
        .legend-item.claustro { background: #fff3e0; }
        .legend-item.salidas { background: #e8f5e9; }
        .legend-item.consejo { background: #f3e5f5; }
        .legend-item.evaluacion { background: #fce4ec; }
        .legend-item.efemerides { background: #ffebee; }
        
        .months-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .month-container {
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
        }
        
        .month-header {
            background: #667eea;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: 700;
            font-size: 18px;
        }
        
        .calendar-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .calendar-table th {
            background: #f8f9fa;
            padding: 10px 5px;
            font-size: 12px;
            font-weight: 600;
            color: #666;
            border: 1px solid #e0e0e0;
        }
        
        .calendar-table td {
            padding: 5px;
            border: 1px solid #e0e0e0;
            vertical-align: top;
            height: 80px;
            font-size: 11px;
            position: relative;
        }
        
        .calendar-table td.empty {
            background: #f5f5f5;
        }
        
        .calendar-table td.weekend {
            background: #f5f5f5;
        }
        
        .day-number {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 4px;
        }
        
        .event-dot {
            font-size: 8px;
            padding: 2px 4px;
            border-radius: 3px;
            margin: 2px 0;
            display: block;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .event-dot:hover {
            transform: scale(1.05);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        .event-dot.etae { background: #e1f5fe; color: #01579b; }
        .event-dot.etcp { background: #e3f2fd; color: #0d47a1; }
        .event-dot.claustro { background: #fff3e0; color: #e65100; }
        .event-dot.salidas { background: #e8f5e9; color: #1b5e20; }
        .event-dot.consejo { background: #f3e5f5; color: #4a148c; }
        .event-dot.evaluacion { background: #fce4ec; color: #880e4f; }
        .event-dot.efemerides { background: #ffebee; color: #b71c1c; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }
        
        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 28px;
            font-weight: bold;
            color: #999;
            cursor: pointer;
            border: none;
            background: none;
        }
        
        .modal-close:hover {
            color: #333;
        }
        
        .modal h2 {
            color: #667eea;
            margin-bottom: 20px;
        }
        
        .modal-field {
            margin-bottom: 15px;
        }
        
        .modal-field label {
            font-weight: 600;
            color: #666;
            font-size: 14px;
        }
        
        .modal-field p {
            margin-top: 5px;
            font-size: 16px;
            color: #333;
        }
        
        .delete-event-btn {
            background: #f44336;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .alert {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            color: #856404;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
            font-size: 18px;
        }
        
        @media (max-width: 1200px) {
            .months-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-info">
                CEIP BARTOLOMÉ FLORES<span>•</span>MOJÁCAR - ALMERÍA<span>•</span>04638<span>•</span>04003160@juntadeandalucia.es
            </div>
            <h1>Calendario Académico</h1>
            <p>Curso 2025-2026</p>
        </div>
        
        <div class="content">
            <div class="tabs">
                <button class="tab active" onclick="showTab('agregar')">Agregar Evento</button>
                <button class="tab" onclick="showTab('calendario')">Calendario</button>
            </div>
            
            <div id="agregar" class="tab-content active">
                <div class="form-section">
                    <h2 style="margin-bottom: 20px; color: #667eea;">Agregar Nuevo Evento</h2>
                    <form id="eventForm">
                        <div class="form-group">
                            <label for="tipo">Tipo de Evento</label>
                            <select id="tipo" required>
                                <option value="">Seleccionar tipo</option>
                                <option value="etae">ETAE</option>
                                <option value="etcp">ETCP</option>
                                <option value="claustro">Claustro</option>
                                <option value="salidas">Salidas</option>
                                <option value="consejo">Consejo Escolar</option>
                                <option value="evaluacion">Sesión de Evaluación</option>
                                <option value="efemerides">Efemérides</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="titulo">Título del Evento</label>
                            <input type="text" id="titulo" required placeholder="Ej: Reunión ETCP Trimestre 1">
                        </div>
                        
                        <div class="form-group">
                            <label for="fecha">Fecha</label>
                            <input type="date" id="fecha" min="2025-09-01" max="2026-06-30" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="hora">Hora</label>
                            <input type="time" id="hora" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="lugar">Lugar</label>
                            <input type="text" id="lugar" placeholder="Ej: Sala de profesores">
                        </div>
                        
                        <div class="form-group">
                            <label for="descripcion">Descripción</label>
                            <textarea id="descripcion" placeholder="Detalles adicionales del evento"></textarea>
                        </div>
                        
                        <button type="submit" class="btn" id="submitBtn">Agregar Evento</button>
                    </form>
                </div>
                
                <div id="alerts"></div>
            </div>
            
            <div id="calendario" class="tab-content">
                <button class="refresh-btn" onclick="loadData()">🔄 Actualizar Calendario</button>
                
                <div class="legend">
                    <div class="legend-item etae">ETAE</div>
                    <div class="legend-item etcp">ETCP</div>
                    <div class="legend-item claustro">Claustro</div>
                    <div class="legend-item salidas">Salidas</div>
                    <div class="legend-item consejo">Consejo Escolar</div>
                    <div class="legend-item evaluacion">Evaluación</div>
                    <div class="legend-item efemerides">Efemérides</div>
                </div>
                
                <div id="loadingCalendar" class="loading">Cargando calendario...</div>
                <div id="calendarContent"></div>
            </div>
        </div>
    </div>
    
    <div class="modal" id="eventModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <h2 id="modalTitle"></h2>
            <div class="modal-field">
                <label>Tipo:</label>
                <p id="modalTipo"></p>
            </div>
            <div class="modal-field">
                <label>Fecha:</label>
                <p id="modalFecha"></p>
            </div>
            <div class="modal-field">
                <label>Hora:</label>
                <p id="modalHora"></p>
            </div>
            <div class="modal-field">
                <label>Lugar:</label>
                <p id="modalLugar"></p>
            </div>
            <div class="modal-field">
                <label>Descripción:</label>
                <p id="modalDescripcion"></p>
            </div>
            <button class="delete-event-btn" onclick="deleteEvent()">Eliminar Evento</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxW0uSXAqJdFnjy-1xJwXi0moo7bXgBrxZJpSGpNWO1COCGHCd7h2IxJZCTmOkTNFMM0A/exec';
        
        let eventos = [];
        let selectedEvent = null;
        
        const tipoNombres = {
            'etae': 'ETAE',
            'etcp': 'ETCP',
            'claustro': 'Claustro',
            'salidas': 'Salidas',
            'consejo': 'Consejo Escolar',
            'evaluacion': 'Sesión de Evaluación',
            'efemerides': 'Efemérides'
        };
        
        function showTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
            
            if (tabName === 'calendario') {
                loadData();
            }
        }
        
        async function loadData() {
            try {
                document.getElementById('loadingCalendar').style.display = 'block';
                
                const response = await fetch(API_URL + '?action=get&t=' + new Date().getTime());
                const result = await response.json();
                
                if (result.success && result.data) {
                    eventos = result.data;
                } else {
                    eventos = [];
                }
                
                renderCalendar();
            } catch (error) {
                console.error('Error cargando:', error);
                eventos = [];
                renderCalendar();
            }
        }
        
        function renderCalendar() {
            const container = document.getElementById('calendarContent');
            const loading = document.getElementById('loadingCalendar');
            
            loading.style.display = 'none';
            container.innerHTML = '';
            
            const meses = [
                { nombre: 'SEPTIEMBRE 2025', year: 2025, month: 8 },
                { nombre: 'OCTUBRE 2025', year: 2025, month: 9 },
                { nombre: 'NOVIEMBRE 2025', year: 2025, month: 10 },
                { nombre: 'DICIEMBRE 2025', year: 2025, month: 11 },
                { nombre: 'ENERO 2026', year: 2026, month: 0 },
                { nombre: 'FEBRERO 2026', year: 2026, month: 1 },
                { nombre: 'MARZO 2026', year: 2026, month: 2 },
                { nombre: 'ABRIL 2026', year: 2026, month: 3 },
                { nombre: 'MAYO 2026', year: 2026, month: 4 },
                { nombre: 'JUNIO 2026', year: 2026, month: 5 }
            ];
            
            for (let i = 0; i < meses.length; i += 2) {
                const row = document.createElement('div');
                row.className = 'months-row';
                
                row.appendChild(createMonthTable(meses[i]));
                if (i + 1 < meses.length) {
                    row.appendChild(createMonthTable(meses[i + 1]));
                }
                
                container.appendChild(row);
            }
        }
        
        function createMonthTable(mesInfo) {
            const container = document.createElement('div');
            container.className = 'month-container';
            
            const header = document.createElement('div');
            header.className = 'month-header';
            header.textContent = mesInfo.nombre;
            container.appendChild(header);
            
            const table = document.createElement('table');
            table.className = 'calendar-table';
            
            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');
            ['L', 'M', 'Mi', 'J', 'V', 'S', 'D'].forEach(dia => {
                const th = document.createElement('th');
                th.textContent = dia;
                headerRow.appendChild(th);
            });
            thead.appendChild(headerRow);
            table.appendChild(thead);
            
            const tbody = document.createElement('tbody');
            
            const firstDay = new Date(mesInfo.year, mesInfo.month, 1);
            const lastDay = new Date(mesInfo.year, mesInfo.month + 1, 0);
            
            let dayOfWeek = firstDay.getDay();
            dayOfWeek = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
            
            let currentDay = 1;
            let finished = false;
            
            while (!finished) {
                const row = document.createElement('tr');
                
                for (let i = 0; i < 7; i++) {
                    const cell = document.createElement('td');
                    
                    if ((currentDay === 1 && i < dayOfWeek) || currentDay > lastDay.getDate()) {
                        cell.classList.add('empty');
                        row.appendChild(cell);
                        if (currentDay > lastDay.getDate()) finished = true;
                        continue;
                    }
                    
                    const year = mesInfo.year;
                    const month = String(mesInfo.month + 1).padStart(2, '0');
                    const day = String(currentDay).padStart(2, '0');
                    const dateStr = `${year}-${month}-${day}`;
                    
                    const date = new Date(mesInfo.year, mesInfo.month, currentDay);
                    const dayNum = date.getDay();
                    
                    const dayDiv = document.createElement('div');
                    dayDiv.className = 'day-number';
                    dayDiv.textContent = currentDay;
                    cell.appendChild(dayDiv);
                    
                    if (dayNum === 0 || dayNum === 6) {
                        cell.classList.add('weekend');
                    } else {
                        const eventosDelDia = eventos.filter(e => e.fecha === dateStr);
                        
                        eventosDelDia.forEach(evento => {
                            const eventDot = document.createElement('span');
                            eventDot.className = `event-dot ${evento.tipo}`;
                            eventDot.textContent = evento.titulo.substring(0, 15) + (evento.titulo.length > 15 ? '...' : '');
                            eventDot.onclick = () => showEventModal(evento);
                            cell.appendChild(eventDot);
                        });
                    }
                    
                    row.appendChild(cell);
                    currentDay++;
                }
                
                tbody.appendChild(row);
            }
            
            table.appendChild(tbody);
            container.appendChild(table);
            
            return container;
        }
        
        function showEventModal(evento) {
            selectedEvent = evento;
            
            document.getElementById('modalTitle').textContent = evento.titulo;
            document.getElementById('modalTipo').textContent = tipoNombres[evento.tipo];
            
            const fecha = new Date(evento.fecha + 'T00:00:00');
            document.getElementById('modalFecha').textContent = fecha.toLocaleDateString('es-ES', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
            
            document.getElementById('modalHora').textContent = evento.hora || 'No especificada';
            document.getElementById('modalLugar').textContent = evento.lugar || 'No especificado';
            document.getElementById('modalDescripcion').textContent = evento.descripcion || 'Sin descripción';
            
            document.getElementById('eventModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('eventModal').classList.remove('active');
            selectedEvent = null;
        }
        
        async function deleteEvent() {
            if (!selectedEvent) return;
            
            if (!confirm('¿Seguro que deseas eliminar este evento?')) return;
            
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    redirect: 'follow',
                    headers: { 
                        'Content-Type': 'text/plain;charset=utf-8'
                    },
                    body: JSON.stringify({
                        action: 'delete',
                        tipo: selectedEvent.tipo,
                        titulo: selectedEvent.titulo,
                        fecha: selectedEvent.fecha
                    })
                });
                
                closeModal();
                setTimeout(() => loadData(), 1000);
                
            } catch (error) {
                console.log('Evento eliminado');
                closeModal();
                setTimeout(() => loadData(), 1000);
            }
        }
        
        document.getElementById('eventForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const alertsDiv = document.getElementById('alerts');
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Guardando...';
            alertsDiv.innerHTML = '';
            
            const tipo = document.getElementById('tipo').value;
            const titulo = document.getElementById('titulo').value;
            const fecha = document.getElementById('fecha').value;
            const hora = document.getElementById('hora').value;
            const lugar = document.getElementById('lugar').value;
            const descripcion = document.getElementById('descripcion').value;
            
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    redirect: 'follow',
                    headers: { 
                        'Content-Type': 'text/plain;charset=utf-8'
                    },
                    body: JSON.stringify({
                        action: 'set',
                        tipo: tipo,
                        titulo: titulo,
                        fecha: fecha,
                        hora: hora,
                        lugar: lugar,
                        descripcion: descripcion
                    })
                });
                
                alertsDiv.innerHTML = '<div class="alert" style="background: #d4edda; border-color: #c3e6cb; color: #155724;">✓ Evento agregado correctamente. Actualizando...</div>';
                
                this.reset();
                
                setTimeout(() => {
                    loadData();
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Agregar Evento';
                    alertsDiv.innerHTML = '';
                }, 2000);
                
            } catch (error) {
                console.log('Evento enviado');
                alertsDiv.innerHTML = '<div class="alert" style="background: #d4edda; border-color: #c3e6cb; color: #155724;">✓ Evento agregado correctamente. Actualizando...</div>';
                
                this.reset();
                
                setTimeout(() => {
                    loadData();
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Agregar Evento';
                    alertsDiv.innerHTML = '';
                }, 2000);
            }
        });
        
        loadData();
    </script>
</body>
</html>
